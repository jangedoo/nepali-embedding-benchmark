name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with: { enable-cache: true }
      - run: uv sync --locked --extra dev
      - run: uv run pytest -m 'not contract'
      - run: uv run neb validate
      - run: uv run neb export --output /tmp/neb-export
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with: { enable-cache: true }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: npm, cache-dependency-path: site/package-lock.json }
      - run: uv sync --locked
      - run: uv run neb export
      - run: npm ci
        working-directory: site
      - run: npm test
        working-directory: site
      - run: npm run build
        working-directory: site
