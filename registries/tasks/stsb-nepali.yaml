id: stsb-nepali
version: 2
display_name: STS-B Nepali
description: Semantic textual similarity in Nepali and cross-lingual English–Nepali directions.
dataset:
  id: jangedoo/stsb_nepali
  revision: 4bfcc74faa37875185b27a5dc64888f4711e833b
  url: https://huggingface.co/datasets/jangedoo/stsb_nepali/tree/4bfcc74faa37875185b27a5dc64888f4711e833b
adapter: sts
license: unknown
homepage: https://huggingface.co/datasets/jangedoo/stsb_nepali
views:
  - id: ne-ne
    split: test
    languages: [ne]
    columns: {sentence1: sentence1_ne, sentence2: sentence2_ne, score: score}
    metrics: [cosine_spearman, cosine_pearson]
    primary_metric: cosine_spearman
  - id: en-ne
    split: test
    languages: [en, ne]
    columns: {sentence1: sentence1, sentence2: sentence2_ne, score: score}
    metrics: [cosine_spearman, cosine_pearson]
    primary_metric: cosine_spearman
  - id: ne-en
    split: test
    languages: [ne, en]
    columns: {sentence1: sentence1_ne, sentence2: sentence2, score: score}
    metrics: [cosine_spearman, cosine_pearson]
    primary_metric: cosine_spearman
