id: nanobeir-ne
version: 1
display_name: NanoBEIR Nepali
description: Thirteen separately reported Nepali retrieval subsets.
dataset:
  id: jangedoo/NanoBEIR-ne
  revision: dbe0a6befdfce448982392bd461ac5d16485e99e
  url: https://huggingface.co/datasets/jangedoo/NanoBEIR-ne/tree/dbe0a6befdfce448982392bd461ac5d16485e99e
adapter: retrieval
license: unknown
homepage: https://huggingface.co/datasets/jangedoo/NanoBEIR-ne
reviewed_adapter: neb.adapters.add_nanobeir_relevance
views:
  - &retrieval
    id: arguana
    split: NanoArguAna
    resources: {corpus: corpus, queries: queries, qrels: qrels}
    languages: [ne]
    columns: {query_id: query-id, query: query, corpus_id: corpus-id, text: text, score: score}
    primary_metric: ndcg_at_10
  - <<: *retrieval
    id: climatefever
    split: NanoClimateFEVER
  - <<: *retrieval
    id: dbpedia
    split: NanoDBPedia
  - <<: *retrieval
    id: fever
    split: NanoFEVER
  - <<: *retrieval
    id: fiqa2018
    split: NanoFiQA2018
  - <<: *retrieval
    id: hotpotqa
    split: NanoHotpotQA
  - <<: *retrieval
    id: msmarco
    split: NanoMSMARCO
  - <<: *retrieval
    id: nfcorpus
    split: NanoNFCorpus
  - <<: *retrieval
    id: nq
    split: NanoNQ
  - <<: *retrieval
    id: quoraretrieval
    split: NanoQuoraRetrieval
  - <<: *retrieval
    id: scidocs
    split: NanoSCIDOCS
  - <<: *retrieval
    id: scifact
    split: NanoSciFact
  - <<: *retrieval
    id: touche2020
    split: NanoTouche2020
